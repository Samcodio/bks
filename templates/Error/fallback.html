{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Error | First National</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="{% static 'css/styles.css' %}">

    <style>
        .error-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
            padding: 2rem;
            background-color: var(--bg-color);
        }

        /* The Elevated Official System Card */
        .error-card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            max-width: 550px;
            width: 100%;
            padding: 4rem 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.04);
            overflow: hidden;
        }

        /* Institutional Gold Top Strip */
        .error-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background-color: var(--brand-accent, #cba052);
        }

        /* Stacked Visual Component: Icon behind text */
        .error-visual-stack {
            position: relative;
            width: 100%;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .error-bg-icon {
            position: absolute;
            font-size: 12rem;
            color: var(--brand-primary);
            opacity: 0.03;
            z-index: 1;
            pointer-events: none;
            transform: rotate(-5deg);
        }

        [data-theme="dark"] .error-bg-icon {
            color: var(--text-primary);
            opacity: 0.02;
        }

        .error-code {
            font-family: var(--font-heading);
            font-size: 7rem;
            font-weight: 700;
            line-height: 1;
            color: var(--brand-primary);
            z-index: 2;
            letter-spacing: -2px;
            margin: 0;
            text-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        [data-theme="dark"] .error-code {
            color: var(--text-primary);
        }

        /* Typography adjustments */
        .error-title {
            font-family: var(--font-heading);
            font-size: 1.75rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        .error-message {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            max-width: 420px;
        }

        /* Official Action Block */
        .error-actions {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-top: 1px dashed var(--border-color);
            padding-top: 2rem;
        }

        .error-actions .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            padding: 0.75rem 2rem;
        }

        @media (max-width: 480px) {
            .error-card {
                padding: 3rem 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="error-wrapper">
        <div class="error-card">

            <div class="error-visual-stack">
                <i class="fa-solid fa-magnifying-glass error-bg-icon"></i>
                <h1 class="error-code">404</h1>
            </div>

            <h2 class="error-title">System Request Interrupted</h2>
            <p class="error-message">
                The server was unable to process this action or render the requested component. Please contact support if this persists.
            </p>

            <div class="error-actions">
                <button onclick="history.back()" class="btn btn-outline">
                    <i class="fa-solid fa-arrow-left"></i> Return to Safety
                </button>
            </div>

        </div>
    </div>

    <script src="{% static 'js/script.js' %}"></script>

</body>
</html>
