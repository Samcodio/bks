{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Successful | First National</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <div class="secure-wrapper">
        <main class="main-content" style="display: flex; align-items: center; justify-content: center;">
            <div class="card" style="max-width: 450px; text-align: center; padding: 3rem;">
                <div style="width: 80px; height: 80px; background: rgba(5, 150, 105, 0.1); color: var(--success); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                    <i class="fa-solid fa-check fa-2x"></i>
                </div>
                <h2>Transaction Complete</h2>
                <p style="color: var(--text-secondary); margin-top: 0.5rem;">Deposit Recieved.</p>

                <div style="background: var(--bg-color); padding: 1rem; border-radius: 4px; margin: 2rem 0; text-align: left;">
                    <p style="font-size: 0.8rem; color: var(--text-secondary);">Transaction ID: <strong>FT99283410294</strong></p>
                    <p style="font-size: 0.8rem; color: var(--text-secondary);">Date: <strong>May 11, 2026</strong></p>
                </div>

                <a href="{% url 'app:dashboard' %}" class="btn btn-primary" style="width: 100%;">Return to Dashboard</a>
                <a href="{% url 'app:history' %}" class="btn btn-outline mt-1" style="width: 100%;">View History</a>
            </div>
        </main>
    </div>
    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
