{% extends 'base.html' %}
{% load static %}
{% block title %}
<title>Transfer Money | First National</title>
{% endblock %}
{% block content %}
    <style>
        /* Page-specific layout fixes */
        .transfer-container {
            max-width: 650px;
            margin: 0 auto;
            width: 100%;
        }
        .stepper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 2rem;
        }
        .step {
            display: flex;
            align-items: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
        }
        .step.active { color: var(--brand-primary); }
        .step-line {
            width: 40px;
            height: 2px;
            background: var(--border-color);
            margin: 0 15px;
        }

        /* Premium Amount Input Styling */
        .amount-wrapper {
            text-align: center;
            margin: 2.5rem 0;
            padding: 2rem 0;
            background: rgba(15, 32, 66, 0.03);
            border-radius: 8px;
            border: 1px dashed var(--border-color);
        }
        .amount-input-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .currency-symbol {
            font-size: 2.5rem;
            color: var(--text-secondary);
            font-family: var(--font-body);
            margin-right: 5px;
        }
        .amount-input {
            font-size: 3.5rem;
            font-family: var(--font-body);
            color: var(--text-primary);
            background: transparent;
            border: none;
            outline: none;
            width: 250px;
            text-align: left;
        }
        .amount-input::placeholder { color: var(--border-color); }

        /* Removing arrows from number input */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] { -moz-appearance: textfield; }
    </style>
        <main class="main-content">
            <div class="transfer-container">
                <div class="top-bar" style="justify-content: center;">
                    <h3 style="text-align: center;">Move Money</h3>
                </div>

                <!-- Progress Stepper -->
                <div class="stepper">
                    <div class="step active"><i class="fa-solid fa-circle-dot" style="margin-right: 6px;"></i> Details</div>
                    <div class="step-line"></div>
                    <div class="step"><i class="fa-regular fa-circle" style="margin-right: 6px;"></i> Review</div>
                    <div class="step-line"></div>
                    <div class="step"><i class="fa-regular fa-circle" style="margin-right: 6px;"></i> Complete</div>
                </div>

                <div class="card" style="padding: 2.5rem;">
                    <form>
                        <!-- Big Amount Input -->
                        <div class="amount-wrapper">
                            <label style="display: block; color: var(--text-secondary); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 0.5rem;">Amount to Send</label>
                            <div class="amount-input-container">
                                <span class="currency-symbol">$</span>
                                <input type="number" class="amount-input" placeholder="0.00" step="0.01">
                            </div>
                            <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem;">Daily Limit Remaining: $10,000.00</p>
                        </div>

                        <div class="grid-2">
                            <div class="form-group">
                                <label><i class="fa-solid fa-building-columns" style="color: var(--text-secondary); margin-right: 5px;"></i> From Account</label>
                                <select class="form-control" style="padding: 0.8rem;">
                                    <option>Savings (...{{request.user.account.account_genID|slice:"-4:" }}) - ${{request.user.account.balance}}</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label><i class="fa-solid fa-user-plus" style="color: var(--text-secondary); margin-right: 5px;"></i> To Account / Recipient</label>
                                <input type="number" class="form-control" style="padding: 0.8rem;" placeholder="Add a new recipient...">
                            </div>
                        </div>
                            <div class="form-group">
                                <label><i class="fa-solid fa-building-columns" style="color: var(--text-secondary); margin-right: 5px;"></i> Recipient's Bank</label>
                                <select class="form-control" style="padding: 0.8rem;">
                                    <option>Sky PLC</option>
                                </select>
                            </div>
                        <div class="form-group" style="margin-top: 1rem;">
                            <label>Memo (Optional)</label>
                            <input type="text" class="form-control" placeholder="e.g. Rent Payment, Dinner..." style="padding: 0.8rem;">
                        </div>

                        <div style="margin-top: 2.5rem;">
                            <a href="transfer-review.html" class="btn btn-primary" style="width: 100%; display: block; text-align: center; padding: 1rem; font-size: 1.05rem;">Continue to Review</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>

{% endblock %}
