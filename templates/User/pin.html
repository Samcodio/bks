{% extends 'base.html' %}
{% load static %}
{% block title %}
<title>Transaction PIN | First National</title>
{% endblock %}
{% block content %}
<style>
    .pin-container {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin: 2rem 0;
    }
    .pin-box {
        width: 60px;
        height: 70px;
        font-size: 2.5rem;
        font-family: var(--font-body);
        font-weight: 700;
        text-align: center;
        border: 2px solid var(--border-color);
        border-radius: 8px;
        background-color: var(--surface-color);
        color: var(--text-primary);
        transition: var(--transition);
    }
    .pin-box:focus {
        border-color: var(--brand-accent);
        outline: none;
        box-shadow: 0 0 0 3px rgba(203, 160, 82, 0.2);
    }
    /* Hide number arrows */
    .pin-box::-webkit-outer-spin-button,
    .pin-box::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .pin-box[type=number] { -moz-appearance: textfield; }
</style>

<main class="main-content" style="display: flex; align-items: center; justify-content: center; min-height: 80vh;">
    <div class="card" style="max-width: 450px; width: 100%; text-align: center; padding: 3rem 2rem;">
        <i class="fa-solid fa-lock fa-3x" style="color: var(--brand-primary); margin-bottom: 1.5rem;"></i>
        <h3 style="margin-bottom: 0.5rem;">Enter Security PIN</h3>
        <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1rem;">
            Please enter your 4-digit PIN to authorize this action.</br> Be sure not to forget you PIN after entry.
        </p>

        <form method="POST" action="">
            {% csrf_token %}
            <div class="pin-container">
                <input type="password" inputmode="numeric" pattern="[0-9]*" class="pin-box" maxlength="1" oninput="numOnly(this); moveToNext(this, 'pin2')" id="pin1" name="pin1" autofocus required>
                <input type="password" inputmode="numeric" pattern="[0-9]*" class="pin-box" maxlength="1" oninput="numOnly(this); moveToNext(this, 'pin3')" onkeydown="moveToPrev(event, 'pin1')" id="pin2" name="pin2" required>
                <input type="password" inputmode="numeric" pattern="[0-9]*" class="pin-box" maxlength="1" oninput="numOnly(this); moveToNext(this, 'pin4')" onkeydown="moveToPrev(event, 'pin2')" id="pin3" name="pin3" required>
                <input type="password" inputmode="numeric" pattern="[0-9]*" class="pin-box" maxlength="1" onkeydown="moveToPrev(event, 'pin3')" oninput="numOnly(this);" id="pin4" name="pin4" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.05rem; margin-top: 1rem;">
                Verify PIN
            </button>
        </form>
    </div>
</main>

<script>
    function numOnly(input) {
        input.value = input.value.replace(/[^0-9]/g, '');
    }

    // JS to auto-advance to the next input box when a number is typed
    function moveToNext(current, nextFieldID) {
        if (current.value.length >= 1) {
            current.value = current.value.slice(0, 1); // Keep only 1 digit
            document.getElementById(nextFieldID).focus();
        }
    }
    // JS to move back when backspace is pressed on an empty box
    function moveToPrev(event, prevFieldID) {
        if (event.key === "Backspace" && event.target.value === "") {
            document.getElementById(prevFieldID).focus();
        }
    }
</script>
{% endblock %}
